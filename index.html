<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthgubbar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #06050a;
            color: #c8b8d0;
            font-family: 'Rajdhani', 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.6rem, 7vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding-left: 0.08em;
            color: #f0e0f8;
            position: relative;
            animation: titlePulse 4s ease-in-out infinite;
        }

        h1 .chrome {
            background: linear-gradient(180deg, #fff 0%, #d4a0e0 30%, #b06cc8 60%, #6a3a80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(160, 80, 200, 0.4))
                   drop-shadow(0 0 60px rgba(200, 100, 160, 0.2));
        }

        @keyframes titlePulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.15); }
        }

        .tagline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            color: #9080a0;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-top: 0.5rem;
            margin-bottom: 3.5rem;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .countdown {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
            animation: fadeIn 2s ease-out 1s both;
        }

        .countdown-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
            flex-shrink: 0;
            position: relative;
        }

        .countdown-value {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            display: inline-block;
            min-width: 2ch;
            background: linear-gradient(180deg, #e8c8f0 0%, #c890d8 50%, #8a50a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(160, 80, 200, 0.5));
            transition: transform 0.15s ease;
        }

        .countdown-value.tick {
            transform: scale(1.08);
        }

        .countdown-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.6rem;
            font-weight: 400;
            color: #7a6890;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 0.6rem;
        }

        .separator {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.5rem, 4vw, 2.8rem);
            color: #6a5080;
            align-self: flex-start;
            padding-top: 0.2rem;
            font-weight: 400;
            animation: colonBlink 2s step-end infinite;
        }

        @keyframes colonBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            color: #7a6890;
            letter-spacing: 0.15em;
            animation: fadeIn 2s ease-out 1.5s both;
        }

        .live-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #c890d8, #d4a574, #c890d8);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
            display: none;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scanline overlay */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
        }

        /* VHS flicker */
        .vhs-flicker {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
            animation: vhsFlicker 0.15s infinite;
            opacity: 0;
        }

        @keyframes vhsFlicker {
            0% { opacity: 0; }
            5% { opacity: 0.02; background: rgba(160, 80, 200, 0.03); }
            10% { opacity: 0; }
            92% { opacity: 0; }
            93% { opacity: 0.01; background: rgba(200, 140, 100, 0.02); }
            100% { opacity: 0; }
        }

        @media (max-width: 480px) {
            .countdown { gap: 0.4rem; }
            .countdown-unit { width: 70px; }
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="scanlines"></div>
    <div class="vhs-flicker"></div>

    <div class="container">
        <h1><span class="chrome">Synthgubbar</span></h1>
        <p class="tagline">Something is coming</p>
        <div class="countdown" id="countdown">
            <div class="countdown-unit">
                <span class="countdown-value" id="days">--</span>
                <span class="countdown-label">Days</span>
            </div>
            <span class="separator">:</span>
            <div class="countdown-unit">
                <span class="countdown-value" id="hours">--</span>
                <span class="countdown-label">Hours</span>
            </div>
            <span class="separator">:</span>
            <div class="countdown-unit">
                <span class="countdown-value" id="minutes">--</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <span class="separator">:</span>
            <div class="countdown-unit">
                <span class="countdown-value" id="seconds">--</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>
        <p class="subtitle" id="subtitle">Friday 18:00 CET</p>
        <p class="live-text" id="live-text">We are live.</p>
    </div>

    <script>
        // Friday March 6, 2026 at 18:00 Swedish time (CET = UTC+1)
        const target = new Date('2026-03-06T17:00:00Z');

        function pad(n) { return String(n).padStart(2, '0'); }

        let prevS = -1;
        function tick() {
            const now = new Date();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('subtitle').style.display = 'none';
                document.getElementById('live-text').style.display = 'block';
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('days').textContent = pad(d);
            document.getElementById('hours').textContent = pad(h);
            document.getElementById('minutes').textContent = pad(m);
            document.getElementById('seconds').textContent = pad(s);

            // Tick animation on seconds change
            if (s !== prevS) {
                prevS = s;
                const el = document.getElementById('seconds');
                el.classList.add('tick');
                setTimeout(() => el.classList.remove('tick'), 150);
            }
        }

        tick();
        setInterval(tick, 100);

        // --- Canvas: Synthwave sun + grid + stars ---
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Stars
        const stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random() * 0.55,
                r: Math.random() * 1.2 + 0.3,
                twinkle: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.5 + 0.5
            });
        }

        // Grid params
        const gridLines = 30;
        const gridSpeed = 0.00015;
        let gridOffset = 0;

        function drawFrame(time) {
            ctx.clearRect(0, 0, W, H);

            const sunCY = H * 0.58;
            const sunR = Math.min(W, H) * 0.18;
            const horizonY = H * 0.62;

            // Sky gradient
            const sky = ctx.createLinearGradient(0, 0, 0, horizonY);
            sky.addColorStop(0, '#06050a');
            sky.addColorStop(0.4, '#0e0818');
            sky.addColorStop(0.7, '#1a0a28');
            sky.addColorStop(1, '#2a1038');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, horizonY);

            // Stars
            for (const s of stars) {
                const flicker = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * 0.001 * s.speed + s.twinkle));
                ctx.beginPath();
                ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 180, 220, ${flicker * 0.5})`;
                ctx.fill();
            }

            // Sun
            const sunGrad = ctx.createRadialGradient(W / 2, sunCY, 0, W / 2, sunCY, sunR);
            sunGrad.addColorStop(0, 'rgba(220, 160, 100, 0.9)');
            sunGrad.addColorStop(0.3, 'rgba(200, 100, 80, 0.7)');
            sunGrad.addColorStop(0.6, 'rgba(160, 60, 120, 0.5)');
            sunGrad.addColorStop(1, 'rgba(80, 20, 80, 0)');

            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, W, horizonY);
            ctx.clip();

            ctx.beginPath();
            ctx.arc(W / 2, sunCY, sunR, 0, Math.PI * 2);
            ctx.fillStyle = sunGrad;
            ctx.fill();

            // Sun horizontal stripe cutouts
            const stripeCount = 8;
            const stripeH = sunR * 0.035;
            for (let i = 0; i < stripeCount; i++) {
                const frac = (i + 1) / (stripeCount + 1);
                const sy = sunCY - sunR + frac * sunR * 2;
                const gap = stripeH * (1 + i * 0.5);
                ctx.clearRect(0, sy, W, gap);
                // Refill sky behind cleared stripe
                ctx.fillStyle = `rgba(15, 8, 25, ${0.6 + i * 0.05})`;
                ctx.fillRect(0, sy, W, gap);
            }

            ctx.restore();

            // Sun glow on horizon
            const glowGrad = ctx.createRadialGradient(W / 2, horizonY, 0, W / 2, horizonY, sunR * 2.5);
            glowGrad.addColorStop(0, 'rgba(180, 80, 140, 0.15)');
            glowGrad.addColorStop(0.5, 'rgba(100, 40, 100, 0.05)');
            glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glowGrad;
            ctx.fillRect(0, horizonY - sunR * 2, W, sunR * 4);

            // Ground plane gradient
            const ground = ctx.createLinearGradient(0, horizonY, 0, H);
            ground.addColorStop(0, '#1a0828');
            ground.addColorStop(1, '#06050a');
            ctx.fillStyle = ground;
            ctx.fillRect(0, horizonY, W, H - horizonY);

            // Perspective grid
            gridOffset = (time * gridSpeed) % 1;

            ctx.strokeStyle = 'rgba(120, 50, 150, 0.25)';
            ctx.lineWidth = 1;

            // Horizontal lines (perspective)
            for (let i = 0; i < gridLines; i++) {
                const t = (i + gridOffset) / gridLines;
                const perspective = Math.pow(t, 2.5);
                const y = horizonY + perspective * (H - horizonY);
                const alpha = perspective * 0.4;
                ctx.strokeStyle = `rgba(120, 50, 150, ${alpha})`;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // Vertical lines (converging to vanishing point)
            const vLines = 20;
            const vanishX = W / 2;
            for (let i = -vLines; i <= vLines; i++) {
                const spread = (i / vLines);
                const bottomX = vanishX + spread * W * 1.2;
                const alpha = 0.15 * (1 - Math.abs(spread) * 0.6);
                ctx.strokeStyle = `rgba(120, 50, 150, ${alpha})`;
                ctx.beginPath();
                ctx.moveTo(vanishX, horizonY);
                ctx.lineTo(bottomX, H);
                ctx.stroke();
            }

            // Horizon glow line
            const horizGlow = ctx.createLinearGradient(0, 0, W, 0);
            horizGlow.addColorStop(0, 'rgba(120, 50, 150, 0)');
            horizGlow.addColorStop(0.3, 'rgba(180, 80, 160, 0.3)');
            horizGlow.addColorStop(0.5, 'rgba(200, 100, 160, 0.5)');
            horizGlow.addColorStop(0.7, 'rgba(180, 80, 160, 0.3)');
            horizGlow.addColorStop(1, 'rgba(120, 50, 150, 0)');
            ctx.strokeStyle = horizGlow;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, horizonY);
            ctx.lineTo(W, horizonY);
            ctx.stroke();

            // Soft bloom line
            ctx.shadowColor = 'rgba(180, 80, 160, 0.4)';
            ctx.shadowBlur = 15;
            ctx.strokeStyle = 'rgba(180, 80, 160, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, horizonY);
            ctx.lineTo(W, horizonY);
            ctx.stroke();
            ctx.shadowBlur = 0;

            requestAnimationFrame(drawFrame);
        }

        requestAnimationFrame(drawFrame);
    </script>
</body>
</html>
