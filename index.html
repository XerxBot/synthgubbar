<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthgubbar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: #c8b8d0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        .container {
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #e0d0e8;
            text-shadow: 0 0 30px rgba(180, 120, 200, 0.3), 0 0 60px rgba(200, 140, 100, 0.15);
            margin-bottom: 0.5rem;
        }
        .tagline {
            font-size: 0.9rem;
            color: #7a6880;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }
        .countdown {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .countdown-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }
        .countdown-value {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 300;
            color: #d4a574;
            text-shadow: 0 0 20px rgba(212, 165, 116, 0.25);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .countdown-label {
            font-size: 0.65rem;
            color: #5a4a60;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }
        .separator {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #3a2a40;
            align-self: flex-start;
            padding-top: 0.3rem;
            font-weight: 200;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #5a4a60;
            letter-spacing: 0.1em;
        }
        .live-text {
            font-size: 1.4rem;
            color: #d4a574;
            text-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
            display: none;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="container">
        <h1>Synthgubbar</h1>
        <p class="tagline">Something is coming</p>
        <div class="countdown" id="countdown">
            <div class="countdown-unit">
                <span class="countdown-value" id="days">--</span>
                <span class="countdown-label">Days</span>
            </div>
            <span class="separator">:</span>
            <div class="countdown-unit">
                <span class="countdown-value" id="hours">--</span>
                <span class="countdown-label">Hours</span>
            </div>
            <span class="separator">:</span>
            <div class="countdown-unit">
                <span class="countdown-value" id="minutes">--</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <span class="separator">:</span>
            <div class="countdown-unit">
                <span class="countdown-value" id="seconds">--</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>
        <p class="subtitle" id="subtitle">Friday 18:00 CET</p>
        <p class="live-text" id="live-text">We are live.</p>
    </div>
    <script>
        // Friday March 7, 2026 at 18:00 Swedish time (CET = UTC+1)
        const target = new Date('2026-03-06T17:00:00Z');

        function pad(n) { return String(n).padStart(2, '0'); }

        function tick() {
            const now = new Date();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('subtitle').style.display = 'none';
                document.getElementById('live-text').style.display = 'block';
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('days').textContent = pad(d);
            document.getElementById('hours').textContent = pad(h);
            document.getElementById('minutes').textContent = pad(m);
            document.getElementById('seconds').textContent = pad(s);

            requestAnimationFrame(tick);
        }

        tick();
        setInterval(tick, 1000);

        // Subtle floating particles
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        for (let i = 0; i < 40; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1.5 + 0.5,
                dx: (Math.random() - 0.5) * 0.3,
                dy: (Math.random() - 0.5) * 0.3,
                alpha: Math.random() * 0.15 + 0.05
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const p of particles) {
                p.x += p.dx;
                p.y += p.dy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 140, 200, ${p.alpha})`;
                ctx.fill();
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();
    </script>
</body>
</html>
